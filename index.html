<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>جميع الأعضاء • منصتي</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
  .container { position: relative; } .stories-row { position: sticky; top: 0; z-index: 1000; overflow-x: auto; overflow-y: hidden; white-space: nowrap; -webkit-overflow-scrolling: touch; }
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', 'Tajawal', sans-serif;
    }
  
  
  .view-toggle { 
    display: none !important; 
}
.offline-indicator { 
    display: none !important; 
}
.container {
    margin-top: 0 !important;
}
  #memberCount { 
    display: none !important; 
    visibility: hidden !important;
    opacity: 0 !important;
    height: 0 !important;
    width: 0 !important;
    margin: 0 !important;
    padding: 0 !important;
    overflow: hidden !important;
    position: absolute !important;
    pointer-events: none !important;
}
    body {
      background: linear-gradient(145deg, #e2e8f0, #cbd5e1);
      min-height: 100vh;
      padding: 20px 10px 30px;
      color: #0f172a;
    }

    .container {
      max-width: 500px;
      margin: 0 auto;
    }

    /* تبديل العرض */
    .view-toggle {
      display: flex;
      gap: 10px;
      margin-bottom: 15px;
      background: rgba(255,255,255,0.4);
      backdrop-filter: blur(8px);
      padding: 8px;
      border-radius: 40px;
    }

    .view-toggle button {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 30px;
      font-weight: bold;
      cursor: pointer;
      background: transparent;
      color: #475569;
      transition: 0.3s;
    }

    .view-toggle button.active {
      background: #1e293b;
      color: white;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }

    /* شريط القصص */
    .stories-row {
      display: flex;
      overflow-x: auto;
      gap: 12px;
      padding: 12px 5px;
      margin-bottom: 20px;
      background: rgba(255,255,255,0.4);
      backdrop-filter: blur(8px);
      border-radius: 30px;
      box-shadow: inset 2px 2px 5px #ffffff, inset -2px -2px 5px #94a3b8;
    }

    .story-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      cursor: pointer;
      min-width: 70px;
    }

    .story-avatar {
      width: 65px;
      height: 65px;
      border-radius: 50%;
      padding: 2px;
      background: linear-gradient(45deg, #fbbf24, #ec4899, #8b5cf6);
    }

    .story-avatar img, .story-avatar span {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      border: 2px solid white;
      object-fit: cover;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #1e293b;
      color: white;
      font-size: 30px;
    }

    .story-name {
      font-size: 10px;
      font-weight: 600;
      margin-top: 5px;
      color: #1e293b;
      text-align: center;
    }

    /* مربع البحث */
    .search-wrapper {
      background: linear-gradient(145deg, #f8fafc, #e2e8f0);
      border-radius: 40px;
      padding: 6px 6px 6px 15px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      box-shadow: inset 2px 2px 5px #ffffff, inset -2px -2px 5px #94a3b8;
    }

    .search-wrapper i {
      color: #64748b;
      margin-left: 8px;
    }

    .search-wrapper input {
      flex: 1;
      border: none;
      background: transparent;
      padding: 12px 5px;
      font-size: 15px;
      outline: none;
    }

    /* قائمة الأعضاء */
    .members-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .member-card {
      background: linear-gradient(145deg, #f8fafc, #e2e8f0);
      border-radius: 20px;
      padding: 14px 16px;
      box-shadow: inset 2px 2px 5px #ffffff, inset -2px -2px 5px #94a3b8, 3px 3px 8px rgba(0,0,0,0.1);
      display: flex;
      align-items: center;
      justify-content: space-between;
      transition: all 0.2s;
      border: 1px solid rgba(255,255,255,0.5);
    }

    .member-info {
      display: flex;
      align-items: center;
      gap: 14px;
      cursor: pointer;
      flex: 1;
    }

    .member-avatar {
      width: 55px;
      height: 55px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      border: 3px solid #fbbf24;
      overflow: hidden;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    }

    .member-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .member-details {
      flex: 1;
    }

    .member-name {
      font-weight: 800;
      font-size: 16px;
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 4px;
      flex-wrap: wrap;
    }

    .verified-badge {
      color: #3b82f6;
      font-size: 14px;
    }

    .user-id-badge {
      font-size: 10px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 20px;
      background: #fbbf24;
    }

    .id-1-digit { color: #00ff00 !important; font-weight: 900; text-shadow: 0 0 10px #00ff00; }
    .id-2-digit { color: #0088ff !important; font-weight: 800; }
    .id-3-digit { color: #ff3333 !important; font-weight: 800; }

    .member-bio {
      font-size: 12px;
      color: #475569;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .online-indicator {
      color: #10b981;
      font-size: 10px;
      margin-left: 5px;
    }

    .offline-indicator {
      color: #94a3b8;
      font-size: 10px;
      margin-left: 5px;
    }

    .member-actions {
      display: flex;
      gap: 8px;
    }

    .action-btn {
      background: linear-gradient(145deg, #ffffff, #e2e8f0);
      border: none;
      width: 40px;
      height: 40px;
      border-radius: 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: inset 1px 1px 3px #ffffff, inset -1px -1px 3px #94a3b8, 2px 2px 5px rgba(0,0,0,0.1);
      color: #1e293b;
      font-size: 16px;
      transition: all 0.2s;
    }

    .action-btn:hover {
      transform: scale(0.95);
    }

    .follow-btn.following {
      background: #10b981;
      color: white;
    }

    /* مودال */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(8px);
      z-index: 3000;
      display: flex;
      align-items: center;
      justify-content: center;
      visibility: hidden;
      opacity: 0;
      transition: 0.25s;
    }

    .modal-overlay.active {
      visibility: visible;
      opacity: 1;
    }

    .modal-sheet {
      background: #0f172a;
      width: 100%;
      max-width: 450px;
      max-height: 90vh;
      overflow-y: auto;
      border-radius: 30px;
      padding: 20px;
      color: white;
      box-shadow: 0 20px 40px rgba(0,0,0,0.5);
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .close-btn {
      background: #334155;
      border: none;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      color: white;
      font-size: 22px;
      cursor: pointer;
    }

    .comment-item {
      background: #1e293b;
      border-radius: 16px;
      padding: 12px;
      margin-bottom: 10px;
    }

    .comment-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
    }

    .comment-avatar {
      width: 35px;
      height: 35px;
      border-radius: 50%;
      border: 2px solid #fbbf24;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f172a;
    }

    #toastMsg {
      position: fixed;
      bottom: 30px;
      left: 20px;
      right: 20px;
      background: #1e293b;
      color: white;
      padding: 14px;
      border-radius: 40px;
      text-align: center;
      z-index: 9999;
      opacity: 0;
      transition: 0.25s;
      max-width: 400px;
      margin: 0 auto;
    }

    #toastMsg.show { opacity: 1; }

    .loading-spinner {
      text-align: center;
      padding: 40px;
    }

    .member-count {
      text-align: center;
      margin-bottom: 10px;
      color: #475569;
      font-size: 14px;
    }
  </style>
</head>
<body>
<div class="container">
  <!-- تبديل بين جميع الأعضاء والنشطين فقط -->
  <div class="view-toggle">
    <button id="showAllBtn" class="active"><i class="fas fa-users"></i> جميع الأعضاء</button>
    <button id="showActiveBtn"><i class="fas fa-circle"></i> النشطين فقط</button>
  </div>

  <!-- صف القصص الأفقي -->
  <div id="storiesRow" class="stories-row"></div>

  <!-- مربع البحث -->
  <div class="search-wrapper">
    <i class="fas fa-search"></i>
    <input type="text" id="memberSearchInput" placeholder="ابحث باسم أو معرف..." autocomplete="off">
  </div>

  <!-- عداد الأعضاء -->
  <div id="memberCount" class="member-count"></div>

  <!-- قائمة الأعضاء -->
  <div id="membersContainer" class="members-list">
    <div class="loading-spinner"><i class="fas fa-spinner fa-spin"></i> جاري تحميل الأعضاء...</div>
  </div>
</div>

<!-- مودال عرض القصة -->
<div class="modal-overlay" id="storyModal">
  <div class="modal-sheet">
    <div class="modal-header">
      <h3><i class="fas fa-clock" style="color: #fbbf24;"></i> <span id="storyModalTitle">ستوري</span></h3>
      <button class="close-btn" onclick="closeModal('storyModal')">&times;</button>
    </div>
    <div id="storyViewContent"></div>
  </div>
</div>

<!-- مودال الملف الشخصي -->
<div class="modal-overlay" id="profileModal">
  <div class="modal-sheet" style="background: #000; max-width: 500px;">
    <div class="modal-header" style="border-bottom: 1px solid #333;">
      <h3 style="color:#fff;"><i class="fas fa-user"></i> <span id="profileModalUsername">الملف الشخصي</span></h3>
      <button class="close-btn" onclick="closeModal('profileModal')">&times;</button>
    </div>
    <div id="profileDetails" style="color:#fff; padding:10px;"></div>
    <div id="profilePostsContainer" style="max-height: 50vh; overflow-y:auto; padding:10px;"></div>
  </div>
</div>

<div id="toastMsg"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.3/firebase-app.js";
  import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.3/firebase-auth.js";
  import { getFirestore, doc, getDoc, setDoc, updateDoc, collection, query, where, getDocs, deleteDoc, onSnapshot, arrayUnion, arrayRemove, increment } from "https://www.gstatic.com/firebasejs/10.12.3/firebase-firestore.js";

  const firebaseConfig = {
  apiKey: "AIzaSyCPBrZMo6IYCwCDYV3HEfNcUmLUITR6VRc",
  authDomain: "elahbes.firebaseapp.com",
  projectId: "elahbes",
  storageBucket: "elahbes.firebasestorage.app",
  messagingSenderId: "800207969145",
  appId: "1:800207969145:web:aa19b725d1c92dd48fada8",
  measurementId: "G-EFT566SJMP"
};

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  let currentUser = null;
  let currentUserData = null;
  let followers = {};
  let stories = [];
  let allUsers = [];
  let activeUids = [];
  let searchTerm = '';
  let showActiveOnly = false; // false = عرض الكل، true = النشطين فقط

  // Helper: Toast
  function showToast(msg, isSuccess = true) {
    const t = document.getElementById('toastMsg');
    t.textContent = msg;
    t.style.background = isSuccess ? '#10b981' : '#ef4444';
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2800);
  }

  window.closeModal = (id) => document.getElementById(id)?.classList.remove('active');
  window.openModal = (id) => document.getElementById(id)?.classList.add('active');

  function renderAvatar(user) {
    if (!user) return '👤';
    if (user.avatarType === 'image' && user.avatarUrl) {
      return `<img src="${user.avatarUrl}" style="width:100%;height:100%;border-radius:50%;object-fit:cover;" onerror="this.parentElement.innerHTML='👤'">`;
    }
    return user.emoji || user.avatarEmoji || '😎';
  }

  function getIdClass(userId) {
    if (!userId) return '';
    const digits = String(userId).replace(/\D/g, '').length;
    if (digits === 1) return 'id-1-digit';
    if (digits === 2) return 'id-2-digit';
    if (digits === 3) return 'id-3-digit';
    return '';
  }

  function isFollowing(userId) {
    return followers[currentUser?.uid]?.includes(userId) || false;
  }

  function isUserActive(uid) {
    return activeUids.includes(uid);
  }

  // تحميل البيانات الأساسية
  async function loadInitialData() {
    if (!currentUser) return;
    try {
      const userDoc = await getDoc(doc(db, "users", currentUser.uid));
      if (userDoc.exists()) currentUserData = userDoc.data();
      
      const fDoc = await getDoc(doc(db, "social", "followers"));
      if (fDoc.exists()) followers = fDoc.data();
      
      // جلب جميع المستخدمين من Firestore
      const usersSnap = await getDocs(collection(db, "users"));
      allUsers = [];
      usersSnap.forEach(d => {
        const data = d.data();
        // نتأكد أن المستخدم لديه userId (معرف فريد)، إذا لم يوجد نستخدم uid
        const userId = data.userId || d.id.substring(0, 6);
        allUsers.push({ 
          id: d.id, 
          userId: userId,
          ...data 
        });
      });
      
      console.log(`✅ تم تحميل ${allUsers.length} عضو`);
      
      // الاشتراك في الحضور (النشطين)
      onSnapshot(collection(db, "presence"), (snap) => {
        activeUids = [];
        snap.forEach(doc => {
          const data = doc.data();
          if (data.status === 'online' || data.lastSeen > Date.now() - 120000) {
            activeUids.push(doc.id);
          }
        });
        renderMembersList();
      });
      
      // الاشتراك في القصص
      onSnapshot(query(collection(db, "stories"), where("expiresAt", ">", Date.now())), (snap) => {
        stories = [];
        snap.forEach(d => stories.push({ id: d.id, ...d.data() }));
        renderStoriesRow();
      });
      
      // عرض أولي
      renderMembersList();
      
    } catch (e) {
      console.error('❌ خطأ في تحميل البيانات:', e);
      showToast('خطأ في تحميل البيانات', false);
    }
  }

  function getFilteredMembers() {
    let members = allUsers.filter(u => u.userId && u.userId !== currentUserData?.userId);
    
    // فلتر النشطين إذا كان مفعلاً
    if (showActiveOnly) {
      members = members.filter(u => isUserActive(u.id));
    }
    
    // فلتر البحث
    if (searchTerm) {
      members = members.filter(u => 
        (u.username || '').includes(searchTerm) || 
        (u.userId || '').includes(searchTerm) ||
        (u.displayName || '').includes(searchTerm)
      );
    }
    
    return members;
  }

  function renderStoriesRow() {
    const row = document.getElementById('storiesRow');
    if (!row) return;
    const followingList = followers[currentUser?.uid] || [];
    const visibleStories = stories.filter(s => followingList.includes(s.userId) || s.userId === currentUserData?.userId);
    if (visibleStories.length === 0) {
      row.innerHTML = '<p style="padding:15px; color:#64748b;">لا توجد ستوريات من المتابَعين</p>';
      return;
    }
    row.innerHTML = visibleStories.map(s => `
      <div class="story-item" onclick="window.viewStory('${s.id}')">
        <div class="story-avatar">
          ${s.avatarType === 'image' && s.avatarUrl ? `<img src="${s.avatarUrl}">` : `<span>${s.emoji || '👤'}</span>`}
        </div>
        <span class="story-name">${s.username || ''}</span>
      </div>
    `).join('');
  }

  function renderMembersList() {
    const container = document.getElementById('membersContainer');
    const countEl = document.getElementById('memberCount');
    const filtered = getFilteredMembers();
    
    countEl.innerHTML = `👥 ${filtered.length} ${showActiveOnly ? 'عضو نشط' : 'عضو مسجل'}`;
    
    if (filtered.length === 0) {
      container.innerHTML = `<p style="text-align:center;padding:30px;color:#64748b;">
        ${showActiveOnly ? 'لا يوجد أعضاء نشطين حالياً' : 'لا يوجد أعضاء مسجلين'}
      </p>`;
      return;
    }
    
    container.innerHTML = filtered.map(user => {
      const followed = isFollowing(user.userId);
      const idClass = getIdClass(user.userId);
      const isActive = isUserActive(user.id);
      const frameColor = user.colors?.frame || '#fbbf24';
      
      return `
        <div class="member-card">
          <div class="member-info" onclick="window.openProfile('${user.userId}')">
            <div class="member-avatar" style="border-color: ${frameColor};">${renderAvatar(user)}</div>
            <div class="member-details">
              <div class="member-name">
                ${user.username || user.displayName || 'مستخدم'}
                ${user.verified ? '<i class="fas fa-check-circle verified-badge"></i>' : ''}
                <span class="user-id-badge ${idClass}" style="background:${frameColor};">#${user.userId}</span>
                ${isActive ? 
                  '<span class="online-indicator"><i class="fas fa-circle"></i> نشط الآن</span>' : 
                  '<span class="offline-indicator"><i class="far fa-clock"></i> غير متصل</span>'}
              </div>
              <div class="member-bio">${user.bio || '👋 متاح للمراسلة'}</div>
            </div>
          </div>
          <div class="member-actions">
            <button class="action-btn" onclick="window.openPrivateChat('${user.userId}')" title="مراسلة"><i class="fab fa-facebook-messenger"></i></button>
            <button class="action-btn follow-btn ${followed ? 'following' : ''}" onclick="window.followUser('${user.userId}')">
              <i class="fas ${followed ? 'fa-check' : 'fa-user-plus'}"></i>
            </button>
          </div>
        </div>
      `;
    }).join('');
  }

  // ---------- وظائف القصص ----------
  window.viewStory = async function(storyId) {
    const story = stories.find(s => s.id === storyId);
    if (!story) return;
    const isOwner = story.userId === currentUserData?.userId;
    const content = document.getElementById('storyViewContent');
    document.getElementById('storyModalTitle').innerText = `📸 ${story.username || ''}`;
    
    let mediaHtml = '';
    if (story.mediaType === 'image') {
      mediaHtml = `<img src="${story.mediaUrl}" style="max-width:100%; border-radius:20px;" onerror="this.src='https://via.placeholder.com/400x300'">`;
    } else if (story.mediaType === 'youtube') {
      const vid = story.mediaUrl.split('v=')[1]?.split('&')[0] || '';
      mediaHtml = vid ? `<iframe width="100%" height="250" src="https://www.youtube.com/embed/${vid}" frameborder="0" allowfullscreen></iframe>` : '<p>رابط غير صالح</p>';
    } else {
      mediaHtml = story.text ? `<p style="color:#fff;">${story.text}</p>` : '';
    }
    
    content.innerHTML = `
      <div style="display:flex; align-items:center; gap:10px; margin-bottom:20px;">
        <div style="width:45px;height:45px;border-radius:50%;overflow:hidden;border:2px solid gold;" onclick="window.openProfile('${story.userId}')">
          ${story.avatarType==='image'?`<img src="${story.avatarUrl}">`:`<span style="display:flex;align-items:center;justify-content:center;width:100%;height:100%;background:#1e293b;color:white;">${story.emoji}</span>`}
        </div>
        <span style="font-weight:bold;">${story.username}</span>
        ${isOwner ? `<i class="fas fa-trash" style="margin-right:auto; color:#ef4444; cursor:pointer;" onclick="window.deleteStory('${story.id}')"></i>` : ''}
      </div>
      ${story.text ? `<p style="margin-bottom:15px;">${story.text}</p>` : ''}
      ${mediaHtml}
      <div style="display:flex; gap:10px; margin-top:20px;">
        <button onclick="window.toggleStoryLike('${story.id}')" style="background:#fbbf24; border:none; padding:10px 20px; border-radius:30px;"><i class="fas fa-heart"></i> <span id="storyLikes_${story.id}">${story.likes||0}</span></button>
        <button onclick="window.showStoryCommentInput('${story.id}')" style="background:#3b82f6; color:white; border:none; padding:10px 20px; border-radius:30px;"><i class="fas fa-comment"></i> تعليق</button>
      </div>
      <div id="storyComments_${story.id}" style="margin-top:20px;">${renderComments(story.comments||[], story.id)}</div>
    `;
    openModal('storyModal');
  };

  function renderComments(comments, storyId) {
    if (!comments.length) return '<p style="color:#aaa;">لا توجد تعليقات</p>';
    return comments.map(c => `
      <div class="comment-item">
        <div class="comment-header">
          <div class="comment-avatar">${c.emoji || '👤'}</div>
          <strong>${c.username}</strong>
          ${c.userId === currentUserData?.userId ? `<i class="fas fa-trash" style="margin-right:auto; color:#ef4444; cursor:pointer;" onclick="window.deleteStoryComment('${storyId}','${c.id}')"></i>` : ''}
        </div>
        <p>${c.text}</p>
      </div>
    `).join('');
  }

  window.toggleStoryLike = async (sid) => {
    if (!currentUser) return;
    const ref = doc(db, "stories", sid);
    const story = stories.find(s=>s.id===sid);
    if (!story) return;
    const liked = (story.likedBy||[]).includes(currentUser.uid);
    await updateDoc(ref, { likedBy: liked ? arrayRemove(currentUser.uid) : arrayUnion(currentUser.uid), likes: increment(liked ? -1 : 1) });
  };

  window.showStoryCommentInput = async (sid) => {
    const text = prompt('أضف تعليقاً:');
    if (!text) return;
    const comment = {
      id: 'c'+Date.now(), username: currentUserData?.username, userId: currentUserData?.userId, emoji: currentUserData?.emoji, text, timestamp: Date.now()
    };
    await updateDoc(doc(db, "stories", sid), { comments: arrayUnion(comment) });
    showToast('تم إضافة التعليق');
  };

  window.deleteStoryComment = async (sid, cid) => {
    const story = stories.find(s=>s.id===sid);
    const comment = story?.comments?.find(c=>c.id===cid);
    if (comment) {
      await updateDoc(doc(db, "stories", sid), { comments: arrayRemove(comment) });
      showToast('تم حذف التعليق');
    }
  };

  window.deleteStory = async (sid) => { 
    await deleteDoc(doc(db, "stories", sid)); 
    closeModal('storyModal');
    showToast('تم حذف القصة');
  };

  // ---------- الملف الشخصي ----------
  window.openProfile = async (userId) => {
    const user = allUsers.find(u => u.userId === userId) || { userId, username: 'مستخدم '+userId, emoji:'👤', colors:{frame:'#fbbf24'} };
    const followersCount = Object.values(followers).filter(arr => arr?.includes(userId)).length;
    const followingCount = followers[userId]?.length || 0;
    const followed = isFollowing(userId);
    document.getElementById('profileModalUsername').innerText = user.username || user.displayName;
    const details = document.getElementById('profileDetails');
    details.innerHTML = `
      <div style="display:flex; gap:15px; align-items:center;">
        <div style="width:70px;height:70px;border-radius:50%;border:3px solid ${user.colors?.frame || '#fbbf24'};overflow:hidden;">${renderAvatar(user)}</div>
        <div><h2>${user.username || user.displayName} ${user.verified?'<i class="fas fa-check-circle" style="color:#3b82f6;"></i>':''}</h2>
        <span class="user-id-badge">#${user.userId}</span></div>
      </div>
      <div style="display:flex; gap:20px; margin:15px 0;">
        <div><i class="fas fa-users"></i> متابعين ${followersCount}</div>
        <div><i class="fas fa-user-plus"></i> يتابع ${followingCount}</div>
      </div>
      <p>${user.bio || 'لا يوجد نبذة'}</p>
      <div style="display:flex; gap:10px; margin:15px 0;">
        ${userId !== currentUserData?.userId ? `
          <button onclick="window.followUser('${userId}')" style="flex:1; background:${followed?'#10b981':'#4f46e5'}; color:white; border:none; padding:12px; border-radius:8px;">${followed?'متابَع':'متابعة'}</button>
          <button onclick="window.openPrivateChat('${userId}')" style="flex:1; background:#0ea5e9; color:white; border:none; padding:12px; border-radius:8px;">مراسلة</button>
        ` : `<button onclick="alert('سيتم فتح صفحة الإعدادات قريباً')" style="width:100%; background:#333; color:white; border:none; padding:12px; border-radius:8px;">الضبط</button>`}
      </div>
    `;
    document.getElementById('profilePostsContainer').innerHTML = '<p style="color:#aaa; text-align:center;">المنشورات تظهر هنا</p>';
    openModal('profileModal');
  };

  window.followUser = async (userId) => {
    if (!currentUser) return;
    if (!followers[currentUser.uid]) followers[currentUser.uid] = [];
    const idx = followers[currentUser.uid].indexOf(userId);
    if (idx === -1) followers[currentUser.uid].push(userId);
    else followers[currentUser.uid].splice(idx, 1);
    await setDoc(doc(db, "social", "followers"), { [currentUser.uid]: followers[currentUser.uid] }, { merge: true });
    renderMembersList();
    if (document.getElementById('profileModal').classList.contains('active')) window.openProfile(userId);
  };

  window.openPrivateChat = (userId) => {
    localStorage.setItem('openChatWith', userId);
    window.open('https://amanhsn55555-eng.github.io/Msgtdy/', '_blank');
  };

  // تحديث الحضور
  async function updatePresence() {
    if (!currentUser) return;
    const presenceRef = doc(db, "presence", currentUser.uid);
    await setDoc(presenceRef, { status: 'online', lastSeen: Date.now() });
    window.addEventListener('beforeunload', () => {
      setDoc(presenceRef, { status: 'offline', lastSeen: Date.now() });
    });
  }

  // مراقبة حالة المصادقة
  onAuthStateChanged(auth, async (user) => {
    if (user) {
      currentUser = user;
      await loadInitialData();
      updatePresence();
      setInterval(() => updatePresence(), 60000);
    } else {
      document.getElementById('membersContainer').innerHTML = '<p style="text-align:center;padding:30px;">يرجى تسجيل الدخول لعرض الأعضاء</p>';
      document.getElementById('memberCount').innerHTML = '';
    }
  });

  // أحداث البحث والتبديل
  document.getElementById('memberSearchInput').addEventListener('input', (e) => {
    searchTerm = e.target.value;
    renderMembersList();
  });

  document.getElementById('showAllBtn').addEventListener('click', () => {
    showActiveOnly = false;
    document.getElementById('showAllBtn').classList.add('active');
    document.getElementById('showActiveBtn').classList.remove('active');
    renderMembersList();
  });

  document.getElementById('showActiveBtn').addEventListener('click', () => {
    showActiveOnly = true;
    document.getElementById('showActiveBtn').classList.add('active');
    document.getElementById('showAllBtn').classList.remove('active');
    renderMembersList();
  });

  // تصدير الدوال
  window.viewStory = window.viewStory;
  window.openProfile = window.openProfile;
  window.followUser = window.followUser;
  window.openPrivateChat = window.openPrivateChat;
  window.toggleStoryLike = window.toggleStoryLike;
  window.showStoryCommentInput = window.showStoryCommentInput;
  window.deleteStoryComment = window.deleteStoryComment;
  window.deleteStory = window.deleteStory;
</script>
</body>
</html>
